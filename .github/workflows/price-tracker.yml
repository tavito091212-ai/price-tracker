name: Price Tracker

on:
  schedule:
    # Corre cada 5 horas (en UTC). Bogotá es UTC-5, así que:
    # 00:00, 05:00, 10:00, 15:00, 20:00 UTC
    # = 19:00, 00:00, 05:00, 10:00, 15:00 hora Bogotá
    - cron: "0 0,5,10,15,20 * * *"
  # Permite correrlo manualmente desde GitHub
  workflow_dispatch:

permissions:
  contents: write  # necesario para hacer commit de precios.json

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Descargar el repositorio ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Dependencias ──────────────────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          pip install playwright schedule certifi
          playwright install chromium --with-deps

      # ── 4. Restaurar datos previos (caché entre runs) ────────────────────────
      - name: Restaurar datos
        uses: actions/cache@v4
        with:
          path: |
            data/precios.json
            data/status.json
            data/tracker.db
            data/daily_report.json
          key: tracker-data-${{ github.run_id }}
          restore-keys: |
            tracker-data-

      # ── 5. Correr el tracker ─────────────────────────────────────────────────
      - name: Correr tracker
        env:
          # Secrets configurados en GitHub → Settings → Secrets → Actions
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          # Opcionales (si los activas en el futuro):
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
        run: python tracker.py

      # ── 6. Guardar historial en el repo (commit automático) ──────────────────
      - name: Guardar historial de precios
        run: |
          git config user.name  "Price Tracker Bot"
          git config user.email "bot@noreply"
          git add data/precios.json data/status.json data/dashboard.html || true
          git diff --cached --quiet || git commit -m "chore: precios $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      # ── 7. Subir logs como artefacto (visible en GitHub por 7 días) ──────────
      - name: Subir logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
