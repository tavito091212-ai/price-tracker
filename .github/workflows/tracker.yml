name: Price Tracker

on:
  schedule:
    # Corre cada hora (minuto 15 para evitar picos de GitHub)
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Activar logs extra'
        required: false
        default: 'false'

# Permiso de escritura para poder commitear data de vuelta al repo
permissions:
  contents: write

env:
  # Fuerza Node.js 24 para evitar warnings de deprecación
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # mata el job si se cuelga

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── 3. Dependencias Python ─────────────────────────────────────────────
      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      # ── 4. Playwright ──────────────────────────────────────────────────────
      # Ubuntu 24.04 renombró libasound2 → libasound2t64, hay que instalarlo antes
      - name: Instalar Playwright + Chromium
        run: |
          sudo apt-get install -y libasound2t64
          playwright install --with-deps chromium

      # ── 5. Correr el tracker ───────────────────────────────────────────────
      - name: Correr tracker
        env:
          DISCORD_WEBHOOK_URL:       ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC:                ${{ secrets.NTFY_TOPIC }}
          WHATSAPP_PHONE_NUMBER_ID:  ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_ACCESS_TOKEN:     ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_TO:               ${{ secrets.WHATSAPP_TO }}
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:            ${{ secrets.EMAIL_RECEIVER }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
          SERPAPI_KEY:               ${{ secrets.SERPAPI_KEY }}
          KEEPA_API_KEY:             ${{ secrets.KEEPA_API_KEY }}
          AMADEUS_CLIENT_ID:         ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET:     ${{ secrets.AMADEUS_CLIENT_SECRET }}
        run: python tracker.py

      # ── 6. Persistir datos en el repo ──────────────────────────────────────
      - name: Guardar datos de vuelta al repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f data/ || true
          git add -f logs/ || true

          if git diff --cached --quiet; then
            echo "Sin cambios en datos — nada que commitear"
          else
            git commit -m "chore: datos tracker $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # ── 7. Subir logs como artefacto ───────────────────────────────────────
      - name: Subir logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-logs-${{ github.run_number }}
          path: logs/
          if-no-files-found: ignore   # no falla si no hay logs todavía
          retention-days: 7


